<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Centre d'Apprentissage - Gestion des Livres</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
--bg:#0f1117;--bg2:#161b27;--bg3:#1e2538;--bg4:#252d40;
--accent:#f5a623;--success:#22c55e;--warn:#f59e0b;--danger:#ef4444;
--text:#e8eaf0;--text2:#9ba3b8;--text3:#6b7490;
--border:#2a3148;--r:8px;--r2:12px;
font-family:'DM Sans',sans-serif;
}
body{background:var(--bg);color:var(--text);font-size:14px}
h1{font-size:24px;font-weight:700}
h2{font-size:18px;font-weight:600}
h3{font-size:15px;font-weight:500}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r2);padding:1.25rem}
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:var(--r);border:1px solid var(--border);background:var(--bg3);color:var(--text);font-size:13px;cursor:pointer;transition:all.15s}
.btn:hover{background:var(--bg4);border-color:var(--accent)}
.btn.primary{background:var(--accent);border-color:var(--accent);color:#000}
.btn.primary:hover{background:#ffbc4a}
.btn.success{background:var(--success);color:#000}
.btn.danger{background:var(--danger);color:#fff}
.btn.sm{padding:4px 10px;font-size:12px}
input,select,textarea{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);color:var(--text);font-size:13px;padding:8px 12px;width:100%;outline:none}
input:focus,select:focus,textarea:focus{border-color:var(--accent)}
label{font-size:12px;color:var(--text2);display:block;margin-bottom:4px}
.field{margin-bottom:12px}
.row{display:flex;gap:12px}
.row>.field{flex:1}
.tag{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:500}
.tag.blue{background:#1e3a5f;color:#7db8ff}
.tag.green{background:#14351f;color:#4ade80}
table{width:100%;border-collapse:collapse}
th{text-align:left;font-size:11px;color:var(--text3);padding:8px 12px;border-bottom:1px solid var(--border)}
td{padding:8px 12px;border-bottom:1px solid var(--border);font-size:13px}
tr:hover td{background:var(--bg3)}
.topbar{background:var(--bg2);border-bottom:1px solid var(--border);padding:.75rem 1.5rem;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px}
.tabs{display:flex;gap:4px;padding:0 1.5rem;background:var(--bg);border-bottom:1px solid var(--border)}
.tab{padding:10px 20px;cursor:pointer;color:var(--text2);font-weight:500;border-bottom:2px solid transparent}
.tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.panel{display:none;padding:1.5rem}
.panel.active{display:block}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:100;display:flex;align-items:center;justify-content:center;padding:1rem}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r2);width:100%;max-width:550px;max-height:90vh;overflow-y:auto}
.modal-head{padding:1.25rem;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.modal-body{padding:1.25rem}
.modal-foot{padding:1rem 1.25rem;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end}
.stat-card{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);padding:1rem;text-align:center}
.stat-num{font-size:28px;font-weight:700}
.stat-label{font-size:11px;color:var(--text3);margin-top:4px}
.empty-state{text-align:center;padding:2rem;color:var(--text3)}
.checkbox-item{display:flex;align-items:center;gap:10px;padding:10px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);margin-bottom:8px;cursor:pointer}
.checkbox-item:hover{background:var(--bg4);border-color:var(--accent)}
.checkbox-item input{width:18px;height:18px;cursor:pointer}
.book-info{flex:1}
.book-title{font-weight:500}
.book-price{color:var(--accent);font-weight:600}
.bill-summary{background:var(--bg3);border-radius:var(--r);padding:1rem;margin-top:1rem}
.summary-row{display:flex;justify-content:space-between;padding:6px 0}
.summary-total{font-size:16px;font-weight:700;color:var(--accent);border-top:1px solid var(--border);margin-top:6px;padding-top:10px}
.payment-section{background:var(--bg4);border-radius:var(--r);padding:1rem;margin-top:1rem}
.student-detail{font-size:12px;color:var(--text2);margin-top:4px}
</style>
</head>
<body>
<div id="app"></div>

<script>
// ============================================
// DATA STORAGE
// ============================================
const STORAGE_KEY = 'book_manager_app';

let appData = {
  students: [],
  books: [],
  classes: ['CP', 'CE1', 'CE2', 'CM1', 'CM2', '6ème', '5ème', '4ème', '3ème', '2nde', '1ère', 'Tle'],
  payments: []
};

let currentTab = 'checkout';
let selectedStudent = null;
let selectedBooks = [];
let editingStudentId = null;

// ============================================
// INITIALIZE DEFAULT DATA
// ============================================
function initDefaultData() {
  appData.books = [
    { id: 'b1', title: 'Manuel de Français', class: 'CP', price: 45.00, quantity: 30, available: 28 },
    { id: 'b2', title: 'Cahier d\'écriture', class: 'CP', price: 15.00, quantity: 50, available: 45 },
    { id: 'b3', title: 'Manuel de Maths', class: 'CP', price: 40.00, quantity: 30, available: 30 },
    { id: 'b4', title: 'Manuel de Français', class: 'CE1', price: 48.00, quantity: 25, available: 22 },
    { id: 'b5', title: 'Cahier d\'exercices', class: 'CE1', price: 18.00, quantity: 40, available: 38 },
    { id: 'b6', title: 'Lecture CE1', class: 'CE1', price: 35.00, quantity: 25, available: 24 },
    { id: 'b7', title: 'Mathématiques CE2', class: 'CE2', price: 50.00, quantity: 20, available: 18 },
    { id: 'b8', title: 'Français 6ème', class: '6ème', price: 55.00, quantity: 15, available: 12 },
    { id: 'b9', title: 'Anglais 6ème', class: '6ème', price: 48.00, quantity: 15, available: 14 },
  ];
  
  appData.students = [
    { id: 's1', name: 'Amina Hosni', class: 'CP', phone: '06 12 34 56 78', address: 'Casablanca', paid: 0, remaining: 0, books: [] },
    { id: 's2', name: 'Ayoub Beqioui', class: 'CE1', phone: '06 23 45 67 89', address: 'Rabat', paid: 0, remaining: 0, books: [] },
    { id: 's3', name: 'Chahd Hmimssa', class: 'CP', phone: '06 34 56 78 90', address: 'Tanger', paid: 0, remaining: 0, books: [] },
    { id: 's4', name: 'Yasser Laghlaouat', class: 'CE2', phone: '06 45 67 89 01', address: 'Fès', paid: 0, remaining: 0, books: [] },
    { id: 's5', name: 'Ziad Fardi', class: '6ème', phone: '06 56 78 90 12', address: 'Marrakech', paid: 0, remaining: 0, books: [] },
  ];
  
  saveData();
}

function loadData() {
  const saved = localStorage.getItem(STORAGE_KEY);
  if (saved) {
    appData = JSON.parse(saved);
  } else {
    initDefaultData();
  }
}

function saveData() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(appData));
  updateStatsDisplay();
}

function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2); }

function showToast(msg, isError = false) {
  const toast = document.createElement('div');
  toast.style.cssText = `position:fixed;bottom:20px;right:20px;background:${isError ? '#ef4444' : '#22c55e'};color:#000;padding:10px 16px;border-radius:8px;z-index:200;font-size:13px;font-weight:500`;
  toast.textContent = msg;
  document.body.appendChild(toast);
  setTimeout(() => toast.remove(), 3000);
}

function escapeHtml(str) {
  if (!str) return '';
  return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' })[m]);
}

function updateStatsDisplay() {
  const totalStudents = appData.students.length;
  const totalPaid = appData.students.reduce((s, a) => s + (a.paid || 0), 0);
  const totalRemaining = appData.students.reduce((s, a) => s + (a.remaining || 0), 0);
  const totalBooks = appData.books.reduce((s, b) => s + b.quantity, 0);
  const lowStock = appData.books.filter(b => b.available < 5).length;
  
  const statsHtml = `
    <div class="stat-card"><div class="stat-num">${totalStudents}</div><div class="stat-label">Total Students</div></div>
    <div class="stat-card"><div class="stat-num" style="color:#22c55e">${totalPaid.toFixed(2)} DH</div><div class="stat-label">Amount Received</div></div>
    <div class="stat-card"><div class="stat-num" style="color:#f59e0b">${totalRemaining.toFixed(2)} DH</div><div class="stat-label">Remaining</div></div>
    <div class="stat-card"><div class="stat-num">${totalBooks}</div><div class="stat-label">Total Books</div></div>
    <div class="stat-card"><div class="stat-num" style="color:${lowStock > 0 ? '#ef4444' : '#22c55e'}">${lowStock}</div><div class="stat-label">Low Stock</div></div>
  `;
  
  const statsDiv = document.getElementById('statsBar');
  if (statsDiv) statsDiv.innerHTML = statsHtml;
}

// ============================================
// CHECKOUT FUNCTIONS
// ============================================
function searchStudent() {
  const searchTerm = document.getElementById('studentSearch')?.value.toLowerCase().trim();
  const resultsDiv = document.getElementById('studentResults');
  
  if (!searchTerm) {
    resultsDiv.innerHTML = '<div class="empty-state">Enter a student name to search</div>';
    return;
  }
  
  const matches = appData.students.filter(s => s.name.toLowerCase().includes(searchTerm));
  
  if (matches.length === 0) {
    resultsDiv.innerHTML = `<div class="empty-state">No student found. <button class="btn primary sm" onclick="openAddStudentModal('${escapeHtml(searchTerm)}')">Add "${escapeHtml(searchTerm)}" as new student</button></div>`;
  } else {
    resultsDiv.innerHTML = matches.map(s => `
      <div style="padding:12px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);margin-bottom:8px;display:flex;justify-content:space-between;align-items:center">
        <div>
          <strong>${escapeHtml(s.name)}</strong>
          <div class="student-detail">📞 ${escapeHtml(s.phone || 'No phone')} | 📍 ${escapeHtml(s.address || 'No address')}</div>
          <div style="font-size:12px;color:var(--text3)">Class: ${escapeHtml(s.class)}</div>
        </div>
        <button class="btn primary sm" onclick="selectStudent('${s.id}')">Select</button>
      </div>
    `).join('');
  }
}

function selectStudent(studentId) {
  selectedStudent = appData.students.find(s => s.id === studentId);
  selectedBooks = [];
  
  const bookListDiv = document.getElementById('bookSelection');
  const classBooks = appData.books.filter(b => b.class === selectedStudent.class && b.available > 0);
  
  if (classBooks.length === 0) {
    bookListDiv.innerHTML = '<div class="empty-state">No books available for this class</div>';
  } else {
    bookListDiv.innerHTML = `
      <h3 style="margin-bottom:12px">Books for ${escapeHtml(selectedStudent.class)}</h3>
      <div id="booksChecklist">
        ${classBooks.map(book => `
          <label class="checkbox-item">
            <input type="checkbox" value="${book.id}" data-price="${book.price}" data-title="${escapeHtml(book.title)}" onchange="updateBookSelection()">
            <div class="book-info">
              <div class="book-title">${escapeHtml(book.title)}</div>
              <div style="font-size:11px;color:var(--text3)">In stock: ${book.available}</div>
            </div>
            <div class="book-price">${book.price.toFixed(2)} DH</div>
          </label>
        `).join('')}
      </div>
      <div id="billSummary"></div>
      <div class="payment-section" id="paymentSection" style="display:none">
        <div class="row">
          <div class="field"><label>Amount Paid (DH)</label><input type="number" id="amountPaid" value="0" min="0" oninput="updatePaymentSummary()"></div>
        </div>
        <div id="paymentSummary"></div>
        <button class="btn success" style="width:100%;margin-top:12px" onclick="processPayment()">💰 Process Payment</button>
      </div>
    `;
  }
  
  document.getElementById('studentInfo').innerHTML = `
    <div class="card" style="margin-bottom:1rem;background:var(--bg4)">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <div>
          <strong>${escapeHtml(selectedStudent.name)}</strong>
          <div class="student-detail">📞 ${escapeHtml(selectedStudent.phone || 'No phone')} | 📍 ${escapeHtml(selectedStudent.address || 'No address')}</div>
          <div style="font-size:12px">Class: ${escapeHtml(selectedStudent.class)}</div>
        </div>
        <button class="btn sm" onclick="clearSelection()">Change Student</button>
      </div>
    </div>
  `;
}

function updateBookSelection() {
  const checkboxes = document.querySelectorAll('#booksChecklist input:checked');
  selectedBooks = Array.from(checkboxes).map(cb => ({
    id: cb.value,
    title: cb.dataset.title,
    price: parseFloat(cb.dataset.price)
  }));
  
  const total = selectedBooks.reduce((sum, b) => sum + b.price, 0);
  const billDiv = document.getElementById('billSummary');
  
  if (selectedBooks.length === 0) {
    billDiv.innerHTML = '';
    document.getElementById('paymentSection').style.display = 'none';
  } else {
    billDiv.innerHTML = `
      <div class="bill-summary">
        <div class="summary-row"><strong>Selected Books:</strong><span></span></div>
        ${selectedBooks.map(b => `<div class="summary-row"><span>${b.title}</span><span>${b.price.toFixed(2)} DH</span></div>`).join('')}
        <div class="summary-row summary-total"><strong>Total Amount</strong><strong>${total.toFixed(2)} DH</strong></div>
      </div>
    `;
    document.getElementById('paymentSection').style.display = 'block';
    const totalField = document.getElementById('amountPaid');
    if (totalField) totalField.value = total;
    updatePaymentSummary();
  }
}

function updatePaymentSummary() {
  const total = selectedBooks.reduce((sum, b) => sum + b.price, 0);
  const paid = parseFloat(document.getElementById('amountPaid')?.value) || 0;
  const remaining = total - paid;
  
  const paymentSummary = document.getElementById('paymentSummary');
  if (paymentSummary) {
    paymentSummary.innerHTML = `
      <div class="bill-summary" style="margin-top:12px">
        <div class="summary-row"><span>Total</span><span>${total.toFixed(2)} DH</span></div>
        <div class="summary-row"><span>Amount Paid</span><span style="color:#22c55e">${paid.toFixed(2)} DH</span></div>
        <div class="summary-row"><span>Remaining</span><span style="color:${remaining > 0 ? '#f59e0b' : '#22c55e'}">${remaining.toFixed(2)} DH</span></div>
      </div>
    `;
  }
}

function processPayment() {
  if (!selectedStudent || selectedBooks.length === 0) {
    showToast('Please select books first', true);
    return;
  }
  
  const total = selectedBooks.reduce((sum, b) => sum + b.price, 0);
  const paid = parseFloat(document.getElementById('amountPaid')?.value) || 0;
  const remaining = total - paid;
  
  selectedStudent.paid = (selectedStudent.paid || 0) + paid;
  selectedStudent.remaining = (selectedStudent.remaining || 0) + remaining;
  
  if (!selectedStudent.books) selectedStudent.books = [];
  selectedBooks.forEach(book => {
    if (!selectedStudent.books.includes(book.title)) {
      selectedStudent.books.push(book.title);
    }
  });
  
  selectedBooks.forEach(book => {
    const bookItem = appData.books.find(b => b.id === book.id);
    if (bookItem && bookItem.available > 0) {
      bookItem.available--;
    }
  });
  
  appData.payments.push({
    id: uid(),
    studentId: selectedStudent.id,
    studentName: selectedStudent.name,
    amount: paid,
    date: new Date().toISOString(),
    books: selectedBooks.map(b => b.title)
  });
  
  saveData();
  showToast(`Payment processed! Paid: ${paid.toFixed(2)} DH, Remaining: ${remaining.toFixed(2)} DH`);
  
  clearSelection();
  if (currentTab === 'students') renderStudentsList();
}

function clearSelection() {
  selectedStudent = null;
  selectedBooks = [];
  const studentInfo = document.getElementById('studentInfo');
  const bookSelection = document.getElementById('bookSelection');
  const studentResults = document.getElementById('studentResults');
  const studentSearch = document.getElementById('studentSearch');
  
  if (studentInfo) studentInfo.innerHTML = '';
  if (bookSelection) bookSelection.innerHTML = '<div class="empty-state">Select a student to see available books</div>';
  if (studentResults) studentResults.innerHTML = '';
  if (studentSearch) studentSearch.value = '';
}

// ============================================
// STUDENT MANAGEMENT (with Phone & Address)
// ============================================
function openAddStudentModal(presetName = '') {
  editingStudentId = null;
  const modal = document.getElementById('addStudentModal');
  document.getElementById('modalTitle').innerText = 'Add New Student';
  document.getElementById('newStudentName').value = presetName;
  document.getElementById('newStudentPhone').value = '';
  document.getElementById('newStudentAddress').value = '';
  const classSelect = document.getElementById('newStudentClass');
  classSelect.innerHTML = appData.classes.map(c => `<option value="${c}">${c}</option>`).join('');
  modal.style.display = 'flex';
}

function openEditStudentModal(studentId) {
  const student = appData.students.find(s => s.id === studentId);
  if (!student) return;
  
  editingStudentId = studentId;
  const modal = document.getElementById('addStudentModal');
  document.getElementById('modalTitle').innerText = 'Edit Student';
  document.getElementById('newStudentName').value = student.name;
  document.getElementById('newStudentPhone').value = student.phone || '';
  document.getElementById('newStudentAddress').value = student.address || '';
  const classSelect = document.getElementById('newStudentClass');
  classSelect.innerHTML = appData.classes.map(c => `<option value="${c}" ${student.class === c ? 'selected' : ''}>${c}</option>`).join('');
  modal.style.display = 'flex';
}

function closeAddStudentModal() {
  document.getElementById('addStudentModal').style.display = 'none';
  editingStudentId = null;
}

function saveStudent() {
  const name = document.getElementById('newStudentName').value.trim();
  const phone = document.getElementById('newStudentPhone').value.trim();
  const address = document.getElementById('newStudentAddress').value.trim();
  const className = document.getElementById('newStudentClass').value;
  
  if (!name) { showToast('Student name is required', true); return; }
  
  if (editingStudentId) {
    // Update existing student
    const index = appData.students.findIndex(s => s.id === editingStudentId);
    if (index !== -1) {
      appData.students[index] = {
        ...appData.students[index],
        name: name,
        phone: phone,
        address: address,
        class: className
      };
      showToast(`Student ${name} updated!`);
    }
  } else {
    // Add new student
    const newStudent = {
      id: uid(),
      name: name,
      class: className,
      phone: phone,
      address: address,
      paid: 0,
      remaining: 0,
      books: []
    };
    appData.students.push(newStudent);
    showToast(`Student ${name} added!`);
  }
  
  saveData();
  closeAddStudentModal();
  renderStudentsList();
  
  if (currentTab === 'checkout') {
    document.getElementById('studentSearch').value = name;
    searchStudent();
  }
}

function renderStudentsList() {
  const tbody = document.getElementById('studentsList');
  if (!tbody) return;
  
  if (appData.students.length === 0) {
    tbody.innerHTML = '<tr><td colspan="7" class="empty-state">No students added yet</div></td></tr>';
    return;
  }
  
  tbody.innerHTML = appData.students.map(s => `
    <tr>
      <td style="font-weight:500">${escapeHtml(s.name)}</div></td>
      <td><span class="tag blue">${escapeHtml(s.class)}</span></div></td>
      <td>${escapeHtml(s.phone || '—')}</div></td>
      <td>${escapeHtml(s.address || '—')}</div></td>
      <td>${s.books?.length || 0}</div></td>
      <td style="color:#22c55e">${(s.paid || 0).toFixed(2)} DH</div></td>
      <td style="color:${s.remaining > 0 ? '#f59e0b' : '#22c55e'}">${(s.remaining || 0).toFixed(2)} DH</div></td>
      <td>
        <button class="btn sm" onclick="openEditStudentModal('${s.id}')">✏️</button>
        <button class="btn sm danger" onclick="deleteStudent('${s.id}')">🗑️</button>
      </div></tr>
    </tr>
  `).join('');
}

function deleteStudent(id) {
  if (confirm('Delete this student?')) {
    appData.students = appData.students.filter(s => s.id !== id);
    saveData();
    renderStudentsList();
    showToast('Student deleted');
  }
}

// ============================================
// BOOK MANAGEMENT
// ============================================
let editingBookId = null;

function openBookModal(bookId = null) {
  editingBookId = bookId;
  const book = bookId ? appData.books.find(b => b.id === bookId) : null;
  
  document.getElementById('bookModalTitle').innerText = book ? 'Edit Book' : 'Add New Book';
  document.getElementById('bookTitle').value = book?.title || '';
  document.getElementById('bookClass').innerHTML = appData.classes.map(c => `<option value="${c}" ${book?.class === c ? 'selected' : ''}>${c}</option>`).join('');
  document.getElementById('bookPrice').value = book?.price || 0;
  document.getElementById('bookQuantity').value = book?.quantity || 0;
  document.getElementById('bookAvailable').value = book?.available || 0;
  
  document.getElementById('bookModal').style.display = 'flex';
}

function closeBookModal() {
  document.getElementById('bookModal').style.display = 'none';
  editingBookId = null;
}

function saveBook() {
  const title = document.getElementById('bookTitle').value.trim();
  if (!title) { showToast('Book title is required', true); return; }
  
  const bookData = {
    title: title,
    class: document.getElementById('bookClass').value,
    price: parseFloat(document.getElementById('bookPrice').value) || 0,
    quantity: parseInt(document.getElementById('bookQuantity').value) || 0,
    available: parseInt(document.getElementById('bookAvailable').value) || 0
  };
  
  if (editingBookId) {
    const index = appData.books.findIndex(b => b.id === editingBookId);
    if (index !== -1) {
      appData.books[index] = { ...appData.books[index], ...bookData };
      showToast('Book updated ✅');
    }
  } else {
    bookData.id = uid();
    appData.books.push(bookData);
    showToast('Book added ✅');
  }
  
  saveData();
  closeBookModal();
  renderBooksList();
}

function renderBooksList() {
  const tbody = document.getElementById('booksList');
  if (!tbody) return;
  
  if (appData.books.length === 0) {
    tbody.innerHTML = '<tr><td colspan="6" class="empty-state">No books added yet</div></td></tr>';
    return;
  }
  
  tbody.innerHTML = appData.books.map(b => `
    <tr>
      <td style="font-weight:500">${escapeHtml(b.title)}</div></td>
      <td><span class="tag blue">${escapeHtml(b.class)}</span></div></td>
      <td>${b.price.toFixed(2)} DH</div></td>
      <td>${b.quantity}</div></td>
      <td style="color:${b.available < 5 ? '#ef4444' : '#22c55e'}">${b.available}</div></td>
      <td>
        <button class="btn sm" onclick="openBookModal('${b.id}')">✏️</button>
        <button class="btn sm danger" onclick="deleteBook('${b.id}')">🗑️</button>
      </div></td>
    </tr>
  `).join('');
}

function deleteBook(id) {
  if (confirm('Delete this book?')) {
    appData.books = appData.books.filter(b => b.id !== id);
    saveData();
    renderBooksList();
    showToast('Book deleted');
  }
}

// ============================================
// TAB MANAGEMENT
// ============================================
function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelector(`.tab[data-tab="${tab}"]`).classList.add('active');
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.getElementById(`${tab}Panel`).classList.add('active');
  
  if (tab === 'students') renderStudentsList();
  if (tab === 'books') renderBooksList();
  if (tab === 'checkout') updateStatsDisplay();
}

// ============================================
// RENDER APP
// ============================================
function renderApp() {
  document.getElementById('app').innerHTML = `
    <div class="topbar">
      <h1>🎓 Centre d'Apprentissage</h1>
      <div><span class="tag green">${appData.students.length} Students</span> <span class="tag blue">${appData.books.length} Books</span></div>
    </div>
    
    <div id="statsBar" class="row" style="padding:0 1.5rem;margin-bottom:1rem;gap:12px"></div>
    
    <div class="tabs">
      <div class="tab active" data-tab="checkout" onclick="switchTab('checkout')">💰 Checkout</div>
      <div class="tab" data-tab="students" onclick="switchTab('students')">👨‍🎓 Students</div>
      <div class="tab" data-tab="books" onclick="switchTab('books')">📚 Books</div>
    </div>
    
    <div id="checkoutPanel" class="panel active">
      <div style="max-width:800px;margin:0 auto">
        <div class="card">
          <h3 style="margin-bottom:1rem">📝 Student Checkout</h3>
          <div class="field">
            <label>Search Student Name</label>
            <div class="row">
              <input type="text" id="studentSearch" placeholder="Enter student name..." style="flex:1" oninput="searchStudent()">
              <button class="btn" onclick="openAddStudentModal()">+ New Student</button>
            </div>
          </div>
          <div id="studentResults"></div>
          <div id="studentInfo"></div>
          <div id="bookSelection"><div class="empty-state">Select a student to see available books</div></div>
        </div>
      </div>
    </div>
    
    <div id="studentsPanel" class="panel">
      <div class="card" style="padding:0;overflow:hidden">
        <div style="padding:1rem;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center">
          <h3>👨‍🎓 Student List</h3>
          <button class="btn primary sm" onclick="openAddStudentModal()">+ Add Student</button>
        </div>
        <div style="overflow-x:auto">
          <table style="width:100%">
            <thead>
              <tr><th>Name</th><th>Class</th><th>Phone</th><th>Address</th><th>Books</th><th>Paid</th><th>Remaining</th><th></th></tr>
            </thead>
            <tbody id="studentsList"></tbody>
          </table>
        </div>
      </div>
    </div>
    
    <div id="booksPanel" class="panel">
      <div class="card" style="padding:0;overflow:hidden">
        <div style="padding:1rem;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center">
          <h3>📚 Book Inventory</h3>
          <button class="btn primary sm" onclick="openBookModal()">+ Add Book</button>
        </div>
        <div style="overflow-x:auto">
          <table style="width:100%">
            <thead><tr><th>Title</th><th>Class</th><th>Price</th><th>Total</th><th>Available</th><th></th></tr></thead>
            <tbody id="booksList"></tbody>
          </table>
        </div>
      </div>
    </div>
    
    <!-- Add/Edit Student Modal -->
    <div id="addStudentModal" class="modal-overlay" style="display:none">
      <div class="modal">
        <div class="modal-head"><h3 id="modalTitle">Add New Student</h3><button class="btn sm" onclick="closeAddStudentModal()">✕</button></div>
        <div class="modal-body">
          <div class="field"><label>Student Name *</label><input type="text" id="newStudentName" placeholder="Full name"></div>
          <div class="row">
            <div class="field"><label>Phone Number</label><input type="tel" id="newStudentPhone" placeholder="06 XX XX XX XX"></div>
            <div class="field"><label>Class</label><select id="newStudentClass"></select></div>
          </div>
          <div class="field"><label>Address</label><input type="text" id="newStudentAddress" placeholder="City, Address"></div>
        </div>
        <div class="modal-foot"><button class="btn" onclick="closeAddStudentModal()">Cancel</button><button class="btn primary" onclick="saveStudent()">Save Student</button></div>
      </div>
    </div>
    
    <!-- Book Modal -->
    <div id="bookModal" class="modal-overlay" style="display:none">
      <div class="modal">
        <div class="modal-head"><h3 id="bookModalTitle">Add New Book</h3><button class="btn sm" onclick="closeBookModal()">✕</button></div>
        <div class="modal-body">
          <div class="field"><label>Title</label><input type="text" id="bookTitle" placeholder="Book title"></div>
          <div class="field"><label>Class</label><select id="bookClass"></select></div>
          <div class="row">
            <div class="field"><label>Price (DH)</label><input type="number" id="bookPrice" step="0.01" value="0"></div>
            <div class="field"><label>Total Quantity</label><input type="number" id="bookQuantity" value="0"></div>
            <div class="field"><label>Available</label><input type="number" id="bookAvailable" value="0"></div>
          </div>
        </div>
        <div class="modal-foot"><button class="btn" onclick="closeBookModal()">Cancel</button><button class="btn primary" onclick="saveBook()">Save Book</button></div>
      </div>
    </div>
  `;
  
  // Make functions global
  window.switchTab = switchTab;
  window.searchStudent = searchStudent;
  window.selectStudent = selectStudent;
  window.updateBookSelection = updateBookSelection;
  window.updatePaymentSummary = updatePaymentSummary;
  window.processPayment = processPayment;
  window.clearSelection = clearSelection;
  window.openAddStudentModal = openAddStudentModal;
  window.openEditStudentModal = openEditStudentModal;
  window.closeAddStudentModal = closeAddStudentModal;
  window.saveStudent = saveStudent;
  window.deleteStudent = deleteStudent;
  window.openBookModal = openBookModal;
  window.closeBookModal = closeBookModal;
  window.saveBook = saveBook;
  window.deleteBook = deleteBook;
  
  updateStatsDisplay();
  renderStudentsList();
  renderBooksList();
}

// ============================================
// INITIALIZE
// ============================================
loadData();
renderApp();
</script>
</body>
</html>
